[project]
name = "Hemophilia Cost Utility"
version = "0.7"
description = "Discrete markov chain simulation for analyzing cost effectiveness of hemophilia A interventions"
license = {text = "MIT"}
authors = [
  {name = "Mohammad Hashemian", email = "muhammadhashemian@gmail.com"}
]

readme = "README.md"

[tool.pytest.ini_options]
log_cli = true
log_cli_level = "INFO"
pythonpath = [
  "."
]
log_cli_format = "%(filename)s:%(lineno)s:[%(levelname)s] %(message)s"
log_cli_date_format = "%Y-%m-%d %H:%M:%S"

[tool.mypy]
plugins = ["returns.contrib.mypy.returns_plugin"]
ignore_missing_imports = true
strict = true
local_partial_types = true
warn_unreachable = true

enable_error_code = [
  "truthy-bool",
  "truthy-iterable",
  "redundant-expr",
  "unused-awaitable",
  # "ignore-without-code",
  "possibly-undefined",
  "redundant-self",
  # "explicit-override",
  # "mutable-override",
  "unimported-reveal",
  "deprecated",
  "exhaustive-match",
]

disable_error_code = [
  "no-untyped-def", # TODO: fix
]

[[tool.mypy.overrides]]
module = "wemake_python_styleguide.compat.nodes"
# We allow explicit `Any` only in this file, because of the compatibility:
disallow_any_explicit = false

[[tool.mypy.overrides]]
module = "wemake_python_styleguide.compat.packaging"
# We allow unused `ignore` comments, because we cannot sync it between versions:
warn_unused_ignores = false