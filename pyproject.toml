[build-system]
requires = ['setuptools', 'setuptools-scm']
build-backend = "setuptools.build_meta"

[project]
name = "markov_chains"
version = "0.8"
description = "Discrete markov chain toolkit for conduct cost effectiveness analysis"
license = { text = "MIT" }
authors = [
  { name = "Mohammad Hashemian", email = "muhammadhashemian@gmail.com" },
]
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
  "beautifulsoup4",
  "dotenv",
  "enlighten",
  "jupyter",
  "hmmlearn",
  "matplotlib",
  "numba",
  "numpy",
  "pandas",
  "openpyxl",
  "plotly",
  "pydantic",
  "seaborn",
  "pymc",
  "pytest",
  "python-dotenv",
  "SALib",
  "scikit-learn",
  "scipy",
  "sdv",
  "statsmodels",
  "sympy",
  "tqdm",
  "typer",
  "xarray",
]

[tool.pytest.ini_options]
log_cli = true
log_cli_level = "INFO"
pythonpath = ["."]
log_cli_format = "%(filename)s:%(lineno)s:[%(levelname)s] %(message)s"
log_cli_date_format = "%Y-%m-%d %H:%M:%S"

[tool.mypy]
python_version = "3.13"
python_executable = "./.venv/bin/python"
strict = true
local_partial_types = true
ignore_missing_imports = true
warn_unreachable = true
disable_error_code = ["no-untyped-def"]
# plugins = ["returns.contrib.mypy.returns_plugin"]

# enable_error_code = [
#   "truthy-bool",
#   "truthy-iterable",
#   "redundant-expr",
